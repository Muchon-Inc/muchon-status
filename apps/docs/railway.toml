# Railway service configuration for the Astro/Starlight docs site.
#
#   Build Context     : / (monorepo root)
#   Config Path       : apps/docs/railway.toml
#   Dockerfile Path   : apps/docs/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/docs/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
