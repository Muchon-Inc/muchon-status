# Files to exclude from Docker context
ignore:
  - node_modules
  - /apps/docs
  - /apps/screenshot-service
  - /apps/web
  - /apps/dashboard
  - /apps/status-page
  - /apps/workflows
  - /packages/api
  - /packages/integrations/vercel

builders:
  # Stage 1: Install production dependencies
  #
  # Originally this stage used `--mount=type=bind` to expose package.json
  # files without copying them, but Railway's image builder rejects bind
  # mounts ("other mount types are not supported"). Falling back to a
  # plain copy of the workspace works on every BuildKit/Kaniko backend.
  install:
    fromImage: node:24-slim
    workdir: /app/
    labels:
      org.opencontainers.image.stage: install
    copy:
      - . /app/
    run:
      - corepack enable pnpm
      - pnpm install --prod --frozen-lockfile --verbose
    # cache: pnpm store cache mount removed — Railway 의 빌더는
    # `--mount=type=cache` 에 `id=s/<service-id>-<target>` 형식의 id 를
    # 요구하는데, service id 는 Dockerfile 안에서 알 수 없다. 캐시 없이
    # 받으면 install 이 매번 registry 에서 내려받지만 빌드 자체는 통과.

  # Stage 2: Build application (compile to binary)
  build:
    fromImage: oven/bun:1.3.6
    workdir: /app/apps/server
    labels:
      org.opencontainers.image.stage: build
    env:
      NODE_ENV: production
    copy:
      - . /app/
      - fromBuilder: install
        source: /app/node_modules
        target: /app/node_modules
      - fromBuilder: install
        source: /app/apps/server/node_modules
        target: /app/apps/server/node_modules
      - fromBuilder: install
        source: /app/packages
        target: /app/packages
    run: bun build --compile --sourcemap src/index.ts --outfile=app

# Runtime stage
fromImage: debian:bullseye-slim

# Metadata labels
labels:
  org.opencontainers.image.title: OpenStatus Server
  org.opencontainers.image.description: REST API server with Hono framework for OpenStatus
  org.opencontainers.image.source: https://github.com/openstatusHQ/openstatus
  org.opencontainers.image.vendor: OpenStatus
  org.opencontainers.image.authors: OpenStatus Team

# Copy compiled binary
copy:
  - fromBuilder: build
    source: /app/apps/server/app
    target: /bin/
    chmod: "555"

# Install curl for health checks
root:
  run:
    - apt-get update
    - apt-get install -y --no-install-recommends curl
    - rm -rf /var/lib/apt/lists/*

# Security: run as non-root user
user: "1000:1000"

# Expose port
expose: "3000"

# Health check
healthcheck:
  interval: 30s
  timeout: 10s
  start: 30s
  retries: 3
  cmd: curl -f http://localhost:3000/ping || exit 1

# Start application
entrypoint: /bin/app
