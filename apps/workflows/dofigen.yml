ignore:
  - node_modules
  - /apps/docs
  - /apps/screenshot-service
  - /apps/server
  - /apps/web
  - /apps/dashboard
  - /apps/status-page
  - /packages/analytics
  - /packages/api
  - /packages/error
  - /packages/tracker
builders:
  # Originally this stage used `--mount=type=bind` to expose package.json
  # files without copying them, but Railway's image builder rejects bind
  # mounts ("other mount types are not supported"). Falling back to a
  # plain copy of the workspace works on every BuildKit/Kaniko backend.
  install:
    fromImage: node:24-slim
    workdir: /app/
    labels:
      org.opencontainers.image.stage: install
    copy:
      - . /app/
    run:
      - corepack enable pnpm
      - pnpm install --prod --frozen-lockfile --verbose
    # cache: pnpm store cache mount removed — Railway 의 빌더는
    # `--mount=type=cache` 에 `id=s/<service-id>-<target>` 형식의 id 를
    # 요구하는데, service id 는 Dockerfile 안에서 알 수 없다. 캐시 없이
    # 받으면 install 이 매번 registry 에서 내려받지만 빌드 자체는 통과.

  # Stage 4: Build application (compile to binary)
  build:
    fromImage: oven/bun:1.3.11
    workdir: /app/apps/workflows
    labels:
      org.opencontainers.image.stage: build
    copy:
      - . /app/
      - fromBuilder: install
        source: /app/node_modules
        target: /app/node_modules
      - fromBuilder: install
        source: /app/apps/workflows/node_modules
        target: /app/apps/workflows/node_modules
      - fromBuilder: install
        source: /app/packages
        target: /app/packages
      #  Should set env to production here
    # Compile the TypeScript application
    env:
      NODE_ENV: production
    run: bun build --compile --target bun  --sourcemap src/index.ts --outfile=app

  docker:
    fromImage: oven/bun:1.3.11
    workdir: /app/apps/workflows
    copy:
     - . /app/
    run: bun run src/build-docker.ts

  libsql:
    fromImage: node:24-slim
    workdir: /app/
    copy:
      - fromBuilder: docker
        source: /app/apps/build-docker/package.json
        target: /app/package.json
    run:
      - corepack enable pnpm
      - pnpm install --prod --lockfile-only
      # node-linker=hoisted gives a flat node_modules (like npm/bun) so the compiled bun
      # binary can resolve the libsql native addon (@libsql/<platform>) from disk at runtime.
      - pnpm install --prod --frozen-lockfile --config.node-linker=hoisted

fromImage: debian:bullseye-slim
workdir: /app/
root:
  run: apt-get update -q && apt-get install -y -q --no-install-recommends ca-certificates curl && update-ca-certificates && rm -rf /var/lib/apt/lists/* && mkdir -p /app/data && chown -R 1000:1000 /app/data

# Metadata labels
labels:
  org.opencontainers.image.title: OpenStatus Workflows
  org.opencontainers.image.description: Background job processing and probe scheduling for OpenStatus
  org.opencontainers.image.source: https://github.com/openstatusHQ/openstatus
  org.opencontainers.image.vendor: OpenStatus
  org.opencontainers.image.authors: OpenStatus Team

# Copy artifacts from build stages
copy:
  - fromBuilder: build
    source: /app/apps/workflows/app
    target: /app/apps/workflows/
    chmod: "555"
  - fromBuilder: libsql
    source: /app/node_modules
    target: /app/packages/db/node_modules
  - fromBuilder: libsql
    source: /app/node_modules
    target: /app/node_modules
expose: "3000"

entrypoint: /app/apps/workflows/app
